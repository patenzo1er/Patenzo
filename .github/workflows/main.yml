class ProduitManager:
    """Gestion des produits"""
    
    def __init__(self, db_manager: DatabaseManager):
        self.db = db_manager
    
    def ajouter_produit(self, code_produit: str, nom: str, prix_achat: float,
                       prix_vente: float, categorie: str = '', 
                       quantite_min: int = 5, quantite_max: int = 100,
                       description: str = '') -> Dict:
        """Ajouter un nouveau produit"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            cursor.execute('''
                INSERT INTO produits
                (code_produit, nom, description, categorie, prix_achat, 
                 prix_vente, quantite_min, quantite_max)
                VALUES (?, ?, ?, ?, ?, ?, ?, ?)
            ''', (code_produit, nom, description, categorie, prix_achat,
                  prix_vente, quantite_min, quantite_max))
            
            conn.commit()
            product_id = cursor.lastrowid
            conn.close()
            
            return {
                'success': True,
                'message': f'Produit {nom} ajouté avec succès',
                'product_id': product_id
            }
        except sqlite3.IntegrityError:
            return {
                'success': False,
                'message': f'Le code produit {code_produit} existe déjà'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def modifier_produit(self, produit_id: int, **kwargs) -> Dict:
        """Modifier les informations d'un produit"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Construire la requête UPDATE dynamiquement
            colonnes = ', '.join([f'{key} = ?' for key in kwargs.keys()])
            valeurs = list(kwargs.values()) + [produit_id]
            
            cursor.execute(f'''
                UPDATE produits
                SET {colonnes}, date_modification = CURRENT_TIMESTAMP
                WHERE id = ?
            ''', valeurs)
            
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': 'Produit modifié avec succès'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def obtenir_produit(self, produit_id: int) -> Optional[Dict]:
        """Obtenir les détails d'un produit"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            cursor.execute('''
                SELECT * FROM produits WHERE id = ?
            ''', (produit_id,))
            
            produit = cursor.fetchone()
            conn.close()
            
            return dict(produit) if produit else None
        except Exception as e:
            print(f"Erreur: {e}")
            return None
    
    def lister_produits(self, categorie: str = '', actifs_seulement: bool = True) -> List[Dict]:
        """Lister tous les produits"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            if categorie:
                cursor.execute('''
                    SELECT * FROM produits
                    WHERE categorie = ? AND actif = ?
                    ORDER BY nom
                ''', (categorie, 1 if actifs_seulement else 1))
            else:
                cursor.execute('''
                    SELECT * FROM produits
                    WHERE actif = ?
                    ORDER BY nom
                ''', (1 if actifs_seulement else 1,))
            
            produits = [dict(row) for row in cursor.fetchall()]
            conn.close()
            return produits
        except Exception as e:
            print(f"Erreur: {e}")
            return []
    
    def rechercher_produit(self, terme: str) -> List[Dict]:
        """Rechercher des produits par nom ou code"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            terme = f'%{terme}%'
            cursor.execute('''
                SELECT * FROM produits
                WHERE (nom LIKE ? OR code_produit LIKE ?) AND actif = 1
                ORDER BY nom
            ''', (terme, terme))
            
            produits = [dict(row) for row in cursor.fetchall()]
            conn.close()
            return produits
        except Exception as e:
            print(f"Erreur: {e}")
            return []

