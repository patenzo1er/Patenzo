# 5. GESTION DES VENTES
# ============================================

class VenteManager:
    """Gestion des ventes"""
    
    def __init__(self, db_manager: DatabaseManager, stock_manager: StockManager):
        self.db = db_manager
        self.stock = stock_manager
    
    def creer_vente(self, client_nom: str, utilisateur_id: int, 
                   client_contact: str = '', notes: str = '') -> Dict:
        """Créer une nouvelle vente"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Générer numéro de facture unique
            numero_facture = self._generer_numero_facture(cursor)
            
            cursor.execute('''
                INSERT INTO ventes
                (numero_facture, client_nom, client_contact, utilisateur_id, notes)
                VALUES (?, ?, ?, ?, ?)
            ''', (numero_facture, client_nom, client_contact, utilisateur_id, notes))
            
            vente_id = cursor.lastrowid
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': 'Vente créée',
                'vente_id': vente_id,
                'numero_facture': numero_facture
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def ajouter_article_vente(self, vente_id: int, produit_id: int, 
                            quantite: int) -> Dict:
        """Ajouter un article à une vente"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Obtenir le prix de vente du produit
            cursor.execute('''
                SELECT prix_vente, quantite_stock FROM produits WHERE id = ?
            ''', (produit_id,))
            
            result = cursor.fetchone()
            if not result:
                conn.close()
                return {
                    'success': False,
                    'message': 'Produit introuvable'
                }
            
            prix_vente, quantite_stock = result
            
            if quantite_stock < quantite:
                conn.close()
                return {
                    'success': False,
                    'message': 'Stock insuffisant'
                }
            
            montant = prix_vente * quantite
            
            cursor.execute('''
                INSERT INTO details_ventes
                (vente_id, produit_id, quantite, prix_unitaire, montant)
                VALUES (?, ?, ?, ?, ?)
            ''', (vente_id, produit_id, quantite, prix_vente, montant))
            
            # Mettre à jour le montant total de la vente
            cursor.execute('''
                UPDATE ventes
                SET montant_total = (
                    SELECT SUM(montant) FROM details_ventes WHERE vente_id = ?
                )
                WHERE id = ?
            ''', (vente_id, vente_id))
            
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': 'Article ajouté à la vente'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def finaliser_vente(self, vente_id: int, montant_paye: float = 0) -> Dict:
        """Finaliser une vente et mettre à jour le stock"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Obtenir les détails de la vente
            cursor.execute('''
                SELECT * FROM details_ventes WHERE vente_id = ?
            ''', (vente_id,))
            
            details = cursor.fetchall()
            
            # Mettre à jour le stock pour chaque produit
            for detail in details:
                _, _, produit_id, quantite, _, _ = detail
                self.stock.retirer_stock(produit_id, quantite, 
                                        raison='Vente', reference=f'VTE_{vente_id}')
            
            # Mettre à jour le statut de la vente
            cursor.execute('''
                UPDATE ventes
                SET statut = ?, montant_paye = ?
                WHERE id = ?
            ''', ('completee' if montant_paye > 0 else 'en_cours', montant_paye, vente_id))
            
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': 'Vente finalisée avec succès'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def obtenir_vente(self, vente_id: int) -> Optional[Dict]:
        """Obtenir les détails d'une vente"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            cursor.execute('''
                SELECT * FROM ventes WHERE id = ?
            ''', (vente_id,))
            
            vente = cursor.fetchone()
            if vente:
                vente = dict(vente)
                
                # Obtenir les articles
                cursor.execute('''
                    SELECT dv.*, p.nom as produit_nom, p.code_produit
                    FROM details_ventes dv
                    LEFT JOIN produits p ON dv.produit_id = p.id
                    WHERE dv.vente_id = ?
                ''', (vente_id,))
                
                vente['articles'] = [dict(row) for row in cursor.fetchall()]
            
            conn.close()
            return vente
        except Exception as e:
            print(f"Erreur: {e}")
            return None
    
    def lister_ventes(self, date_debut: str = '', date_fin: str = '') -> List[Dict]:
        """Lister les ventes"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            if date_debut and date_fin:
                cursor.execute('''
                    SELECT v.*, u.nom as utilisateur_nom
                    FROM ventes v
                    LEFT JOIN utilisateurs u ON v.utilisateur_id = u.id
                    WHERE DATE(v.date_vente) BETWEEN ? AND ?
                    ORDER BY v.date_vente DESC
                ''', (date_debut, date_fin))
            else:
                cursor.execute('''
                    SELECT v.*, u.nom as utilisateur_nom
                    FROM ventes v
                    LEFT JOIN utilisateurs u ON v.utilisateur_id = u.id
                    ORDER BY v.date_vente DESC
                    LIMIT 100
                ''')
            
            ventes = [dict(row) for row in cursor.fetchall()]
            conn.close()
            return ventes
        except Exception as e:
            print(f"Erreur: {e}")
            return []
    
    def _generer_numero_facture(self, cursor) -> str:
        """Générer un numéro de facture unique"""
        date = datetime.now().strftime('%Y%m%d')
        cursor.execute('''
            SELECT COUNT(*) FROM ventes
            WHERE DATE(date_vente) = ?
        ''', (datetime.now().date(),))
        count = cursor.fetchone()[0] + 1
        return f'FAC-{date}-{count:04d}'

# ============================================
# 6. GESTION DES ACHATS
# ============================================

class AchatManager:
    """Gestion des achats"""
    
    def __init__(self, db_manager: DatabaseManager):
        self.db = db_manager
    
    def creer_achat(self, fournisseur_id: int, utilisateur_id: int) -> Dict:
        """Créer un bon d'achat"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            numero_bon = self._generer_numero_bon(cursor)
            
            cursor.execute('''
                INSERT INTO achats
                (numero_bon, fournisseur_id, utilisateur_id)
                VALUES (?, ?, ?)
            ''', (numero_bon, fournisseur_id, utilisateur_id))
            
            achat_id = cursor.lastrowid
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': 'Bon d\'achat créé',
                'achat_id': achat_id,
                'numero_bon': numero_bon
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def ajouter_article_achat(self, achat_id: int, produit_id: int, 
                             quantite: int, prix_unitaire: float) -> Dict:
        """Ajouter un article à un bon d'achat"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            montant = quantite * prix_unitaire
            
            cursor.execute('''
                INSERT INTO details_achats
                (achat_id, produit_id, quantite, prix_unitaire, montant)
                VALUES (?, ?, ?, ?, ?)
            ''', (achat_id, produit_id, quantite, prix_unitaire, montant))
            
            # Mettre à jour le montant total
            cursor.execute('''
                UPDATE achats
                SET montant_total = (
                    SELECT SUM(montant) FROM details_achats WHERE achat_id = ?
                )
                WHERE id = ?
            ''', (achat_id, achat_id))
            
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': 'Article ajouté'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def recevoir_achat(self, achat_id: int, montant_paye: float = 0) -> Dict:
        """Réceptionner un achat et ajouter au stock"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Obtenir les détails de l'achat
            cursor.execute('''
                SELECT * FROM details_achats WHERE achat_id = ?
            ''', (achat_id,))
            
            details = cursor.fetchall()
            
            # Ajouter au stock
            for detail in details:
                _, _, produit_id, quantite, prix_unitaire, _ = detail
                cursor.execute('''
                    INSERT INTO mouvements_stock
                    (produit_id, type_mouvement, quantite, prix_unitaire, raison, reference)
                    VALUES (?, ?, ?, ?, ?, ?)
                ''', (produit_id, 'ENTREE', quantite, prix_unitaire, 
                      'Achat fournisseur', f'ACH_{achat_id}'))
                
                cursor.execute('''
                    UPDATE produits
                    SET quantite_stock = quantite_stock + ?
                    WHERE id = ?
                ''', (quantite, produit_id))
            
            # Mettre à jour le statut
            cursor.execute('''
                UPDATE achats
                SET statut = ?, montant_paye = ?, date_livraison = CURRENT_TIMESTAMP
                WHERE id = ?
            ''', ('receptionne', montant_paye, achat_id))
            
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': 'Achat réceptionné et stock mis à jour'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def _generer_numero_bon(self, cursor) -> str:
        """Générer un numéro de bon unique"""
        date = datetime.now().strftime('%Y%m%d')
        cursor.execute('''
            SELECT COUNT(*) FROM achats
            WHERE DATE(date_achat) = ?
        ''', (datetime.now().date(),))
        count = cursor.fetchone()[0] + 1
        return f'BON-{date}-{count:04d}'

