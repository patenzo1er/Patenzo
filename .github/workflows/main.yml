# 2. AUTHENTIFICATION & UTILISATEURS
# ============================================

class UtilisateurManager:
    """Gestion des utilisateurs"""
    
    def __init__(self, db_manager: DatabaseManager):
        self.db = db_manager
    
    @staticmethod
    def hash_password(password: str) -> str:
        """Hasher le mot de passe"""
        return hashlib.sha256(password.encode()).hexdigest()
    
    def creer_utilisateur(self, nom: str, email: str, telephone: str, 
                         mot_de_passe: str, role: str = 'employe', 
                         entreprise: str = '') -> Dict:
        """Créer un nouvel utilisateur"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            mot_de_passe_hash = self.hash_password(mot_de_passe)
            
            cursor.execute('''
                INSERT INTO utilisateurs 
                (nom, email, telephone, mot_de_passe, role, entreprise)
                VALUES (?, ?, ?, ?, ?, ?)
            ''', (nom, email, telephone, mot_de_passe_hash, role, entreprise))
            
            conn.commit()
            user_id = cursor.lastrowid
            conn.close()
            
            return {
                'success': True,
                'message': f'Utilisateur {nom} créé avec succès',
                'user_id': user_id
            }
        except sqlite3.IntegrityError:
            return {
                'success': False,
                'message': 'Cet email existe déjà'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def authentifier(self, email: str, mot_de_passe: str) -> Dict:
        """Authentifier un utilisateur"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            mot_de_passe_hash = self.hash_password(mot_de_passe)
            
            cursor.execute('''
                SELECT id, nom, role, entreprise FROM utilisateurs
                WHERE email = ? AND mot_de_passe = ? AND actif = 1
            ''', (email, mot_de_passe_hash))
            
            user = cursor.fetchone()
            conn.close()
            
            if user:
                return {
                    'success': True,
                    'user_id': user[0],
                    'nom': user[1],
                    'role': user[2],
                    'entreprise': user[3]
                }
            else:
                return {
                    'success': False,
                    'message': 'Email ou mot de passe incorrect'
                }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def lister_utilisateurs(self) -> List[Dict]:
        """Lister tous les utilisateurs"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            cursor.execute('''
                SELECT id, nom, email, telephone, role, entreprise, actif
                FROM utilisateurs
                ORDER BY date_creation DESC
            ''')
            
            utilisateurs = [dict(row) for row in cursor.fetchall()]
            conn.close()
            return utilisateurs
        except Exception as e:
            print(f"Erreur: {e}")
            return []

