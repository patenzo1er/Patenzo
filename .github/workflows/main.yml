# ============================================
# 1. BASE DE DONNÉES
# ============================================

class DatabaseManager:
    """Gestion de la base de données SQLite"""
    
    def __init__(self, db_path="stock_manager.db"):
        self.db_path = db_path
        self.init_database()
    
    def init_database(self):
        """Initialiser la base de données"""
        conn = sqlite3.connect(self.db_path)
        cursor = conn.cursor()
        
        # Table Utilisateurs
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS utilisateurs (
                id INTEGER PRIMARY KEY,
                nom TEXT NOT NULL,
                email TEXT UNIQUE,
                telephone TEXT,
                mot_de_passe TEXT NOT NULL,
                role TEXT DEFAULT 'employe',
                devise TEXT DEFAULT 'FCFA',
                entreprise TEXT,
                date_creation TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                actif BOOLEAN DEFAULT 1
            )
        ''')
        
        # Table Produits
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS produits (
                id INTEGER PRIMARY KEY,
                code_produit TEXT UNIQUE NOT NULL,
                nom TEXT NOT NULL,
                description TEXT,
                categorie TEXT,
                prix_achat REAL,
                prix_vente REAL,
                quantite_stock INTEGER DEFAULT 0,
                quantite_min INTEGER DEFAULT 5,
                quantite_max INTEGER DEFAULT 100,
                unite TEXT DEFAULT 'pce',
                fournisseur_id INTEGER,
                date_ajout TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                date_modification TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                actif BOOLEAN DEFAULT 1
            )
        ''')
        
        # Table Mouvements de Stock
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS mouvements_stock (
                id INTEGER PRIMARY KEY,
                produit_id INTEGER NOT NULL,
                type_mouvement TEXT NOT NULL,
                quantite INTEGER NOT NULL,
                prix_unitaire REAL,
                utilisateur_id INTEGER NOT NULL,
                date_mouvement TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                raison TEXT,
                reference TEXT,
                FOREIGN KEY (produit_id) REFERENCES produits(id),
                FOREIGN KEY (utilisateur_id) REFERENCES utilisateurs(id)
            )
        ''')
        
        # Table Fournisseurs
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS fournisseurs (
                id INTEGER PRIMARY KEY,
                nom TEXT NOT NULL,
                contact TEXT,
                telephone TEXT,
                email TEXT,
                adresse TEXT,
                ville TEXT,
                code_postal TEXT,
                pays TEXT DEFAULT 'Cameroun',
                conditions_paiement TEXT,
                date_ajout TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            )
        ''')
        
        # Table Ventes
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS ventes (
                id INTEGER PRIMARY KEY,
                numero_facture TEXT UNIQUE NOT NULL,
                client_nom TEXT,
                client_contact TEXT,
                date_vente TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                montant_total REAL,
                montant_paye REAL DEFAULT 0,
                statut TEXT DEFAULT 'en_cours',
                utilisateur_id INTEGER,
                notes TEXT,
                FOREIGN KEY (utilisateur_id) REFERENCES utilisateurs(id)
            )
        ''')
        
        # Table Détails Ventes
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS details_ventes (
                id INTEGER PRIMARY KEY,
                vente_id INTEGER NOT NULL,
                produit_id INTEGER NOT NULL,
                quantite INTEGER NOT NULL,
                prix_unitaire REAL,
                montant REAL,
                FOREIGN KEY (vente_id) REFERENCES ventes(id),
                FOREIGN KEY (produit_id) REFERENCES produits(id)
            )
        ''')
        
        # Table Achats
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS achats (
                id INTEGER PRIMARY KEY,
                numero_bon TEXT UNIQUE NOT NULL,
                fournisseur_id INTEGER NOT NULL,
                date_achat TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                montant_total REAL,
                montant_paye REAL DEFAULT 0,
                statut TEXT DEFAULT 'en_cours',
                utilisateur_id INTEGER,
                date_livraison TIMESTAMP,
                FOREIGN KEY (fournisseur_id) REFERENCES fournisseurs(id),
                FOREIGN KEY (utilisateur_id) REFERENCES utilisateurs(id)
            )
        ''')
        
        # Table Détails Achats
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS details_achats (
                id INTEGER PRIMARY KEY,
                achat_id INTEGER NOT NULL,
                produit_id INTEGER NOT NULL,
                quantite INTEGER NOT NULL,
                prix_unitaire REAL,
                montant REAL,
                FOREIGN KEY (achat_id) REFERENCES achats(id),
                FOREIGN KEY (produit_id) REFERENCES produits(id)
            )
        ''')
        
        # Table Alertes Stock
        cursor.execute('''
            CREATE TABLE IF NOT EXISTS alertes_stock (
                id INTEGER PRIMARY KEY,
                produit_id INTEGER NOT NULL,
                type_alerte TEXT,
                quantite_actuelle INTEGER,
                seuil INTEGER,
                date_alerte TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                resolue BOOLEAN DEFAULT 0,
                FOREIGN KEY (produit_id) REFERENCES produits(id)
            )
        ''')
        
        conn.commit()
        conn.close()
    
    def get_connection(self):
        """Obtenir une connexion à la base de données"""
        return sqlite3.connect(self.db_path)

