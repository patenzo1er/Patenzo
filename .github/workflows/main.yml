class StockManager:
    """Gestion du stock et des mouvements"""
    
    def __init__(self, db_manager: DatabaseManager):
        self.db = db_manager
    
    def ajouter_stock(self, produit_id: int, quantite: int, 
                     prix_unitaire: float = 0, utilisateur_id: int = 0,
                     raison: str = 'Entrée manuelle', reference: str = '') -> Dict:
        """Ajouter du stock (achat, retour, etc.)"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Enregistrer le mouvement
            cursor.execute('''
                INSERT INTO mouvements_stock
                (produit_id, type_mouvement, quantite, prix_unitaire, 
                 utilisateur_id, raison, reference)
                VALUES (?, ?, ?, ?, ?, ?, ?)
            ''', (produit_id, 'ENTREE', quantite, prix_unitaire, 
                  utilisateur_id, raison, reference))
            
            # Mettre à jour le stock du produit
            cursor.execute('''
                UPDATE produits
                SET quantite_stock = quantite_stock + ?
                WHERE id = ?
            ''', (quantite, produit_id))
            
            # Vérifier les alertes
            self._verifier_alertes(cursor, produit_id)
            
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': f'{quantite} unités ajoutées au stock'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def retirer_stock(self, produit_id: int, quantite: int, 
                     utilisateur_id: int = 0, raison: str = 'Vente',
                     reference: str = '') -> Dict:
        """Retirer du stock (vente, perte, etc.)"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Vérifier la disponibilité
            cursor.execute('SELECT quantite_stock FROM produits WHERE id = ?', 
                          (produit_id,))
            result = cursor.fetchone()
            
            if not result or result[0] < quantite:
                conn.close()
                return {
                    'success': False,
                    'message': 'Stock insuffisant'
                }
            
            # Enregistrer le mouvement
            cursor.execute('''
                INSERT INTO mouvements_stock
                (produit_id, type_mouvement, quantite, utilisateur_id, raison, reference)
                VALUES (?, ?, ?, ?, ?, ?)
            ''', (produit_id, 'SORTIE', quantite, utilisateur_id, raison, reference))
            
            # Mettre à jour le stock
            cursor.execute('''
                UPDATE produits
                SET quantite_stock = quantite_stock - ?
                WHERE id = ?
            ''', (quantite, produit_id))
            
            # Vérifier les alertes
            self._verifier_alertes(cursor, produit_id)
            
            conn.commit()
            conn.close()
            
            return {
                'success': True,
                'message': f'{quantite} unités retirées du stock'
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def obtenir_mouvements(self, produit_id: int = None, 
                          limite: int = 50) -> List[Dict]:
        """Obtenir l'historique des mouvements"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            if produit_id:
                cursor.execute('''
                    SELECT m.*, p.nom as produit_nom, u.nom as utilisateur_nom
                    FROM mouvements_stock m
                    LEFT JOIN produits p ON m.produit_id = p.id
                    LEFT JOIN utilisateurs u ON m.utilisateur_id = u.id
                    WHERE m.produit_id = ?
                    ORDER BY m.date_mouvement DESC
                    LIMIT ?
                ''', (produit_id, limite))
            else:
                cursor.execute('''
                    SELECT m.*, p.nom as produit_nom, u.nom as utilisateur_nom
                    FROM mouvements_stock m
                    LEFT JOIN produits p ON m.produit_id = p.id
                    LEFT JOIN utilisateurs u ON m.utilisateur_id = u.id
                    ORDER BY m.date_mouvement DESC
                    LIMIT ?
                ''', (limite,))
            
            mouvements = [dict(row) for row in cursor.fetchall()]
            conn.close()
            return mouvements
        except Exception as e:
            print(f"Erreur: {e}")
            return []
    
    def _verifier_alertes(self, cursor, produit_id: int):
        """Vérifier et créer les alertes de stock"""
        cursor.execute('''
            SELECT id, quantite_stock, quantite_min, quantite_max, nom
            FROM produits WHERE id = ?
        ''', (produit_id,))
        
        produit = cursor.fetchone()
        if not produit:
            return
        
        id_prod, quantite, quantite_min, quantite_max, nom = produit
        
        # Alerte stock minimum
        if quantite <= quantite_min:
            cursor.execute('''
                INSERT INTO alertes_stock
                (produit_id, type_alerte, quantite_actuelle, seuil)
                VALUES (?, ?, ?, ?)
            ''', (produit_id, 'STOCK_FAIBLE', quantite, quantite_min))
        
        # Alerte surstock
        if quantite > quantite_max:
            cursor.execute('''
                INSERT INTO alertes_stock
                (produit_id, type_alerte, quantite_actuelle, seuil)
                VALUES (?, ?, ?, ?)
            ''', (produit_id, 'SURSTOCK', quantite, quantite_max))

