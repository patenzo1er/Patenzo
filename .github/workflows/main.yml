class FournisseurManager:
    """Gestion des fournisseurs"""
    
    def __init__(self, db_manager: DatabaseManager):
        self.db = db_manager
    
    def ajouter_fournisseur(self, nom: str, contact: str = '', 
                           telephone: str = '', email: str = '',
                           adresse: str = '', ville: str = '') -> Dict:
        """Ajouter un nouveau fournisseur"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            cursor.execute('''
                INSERT INTO fournisseurs
                (nom, contact, telephone, email, adresse, ville, pays)
                VALUES (?, ?, ?, ?, ?, ?, ?)
            ''', (nom, contact, telephone, email, adresse, ville, 'Cameroun'))
            
            conn.commit()
            fournisseur_id = cursor.lastrowid
            conn.close()
            
            return {
                'success': True,
                'message': f'Fournisseur {nom} ajouté',
                'fournisseur_id': fournisseur_id
            }
        except Exception as e:
            return {
                'success': False,
                'message': f'Erreur: {str(e)}'
            }
    
    def lister_fournisseurs(self) -> List[Dict]:
        """Lister tous les fournisseurs"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            cursor.execute('''
                SELECT * FROM fournisseurs
                ORDER BY nom
            ''')
            
            fournisseurs = [dict(row) for row in cursor.fetchall()]
            conn.close()
            return fournisseurs
        except Exception as e:
            print(f"Erreur: {e}")
            return []

# ============================================
# 8. RAPPORTS & STATISTIQUES
# ============================================

class RapportManager:
    """Génération de rapports et statistiques"""
    
    def __init__(self, db_manager: DatabaseManager):
        self.db = db_manager
    
    def obtenir_tableau_bord(self) -> Dict:
        """Obtenir les statistiques du tableau de bord"""
        try:
            conn = self.db.get_connection()
            cursor = conn.cursor()
            
            # Nombre total de produits
            cursor.execute('SELECT COUNT(*) FROM produits WHERE actif = 1')
            total_produits = cursor.fetchone()[0]
            
            # Valeur totale du stock
            cursor.execute('''
                SELECT SUM(quantite_stock * prix_achat) FROM produits WHERE actif = 1
            ''')
            valeur_stock = cursor.fetchone()[0] or 0
            
            # Produits en rupture
            cursor.execute('''
                SELECT COUNT(*) FROM produits WHERE quantite_stock <= quantite_min AND actif = 1
            ''')
            produits_rupture = cursor.fetchone()[0]
            
            # Ventes du jour
            cursor.execute('''
                SELECT SUM(montant_total) FROM ventes
                WHERE DATE(date_vente) = DATE('now')
            ''')
            ventes_jour = cursor.fetchone()[0] or 0
            
            # Achats du mois
            cursor.execute('''
                SELECT SUM(montant_total) FROM achats
                WHERE strftime('%Y-%m', date_achat) = strftime('%Y-%m', 'now')
            ''')
            achats_mois = cursor.fetchone()[0] or 0
            
            # Top 5 produits par ventes
            cursor.execute('''
                SELECT p.nom, SUM(dv.quantite) as total_vendu
                FROM details_ventes dv
                LEFT JOIN produits p ON dv.produit_id = p.id
                GROUP BY dv.produit_id
                ORDER BY total_vendu DESC
                LIMIT 5
            ''')
            top_produits = [{'nom': row[0], 'quantite': row[1]} for row in cursor.fetchall()]
            
            # Alertes de stock
            cursor.execute('''
                SELECT p.nom, p.quantite_stock, p.quantite_min, a.type_alerte
                FROM alertes_stock a
                LEFT JOIN produits p ON a.produit_id = p.id
                WHERE a.resolue = 0
                ORDER BY a.date_alerte DESC
                LIMIT 10
            ''')
            alertes = [{'produit': row[0], 'quantite': row[1], 
                       'minimum': row[2], 'type': row[3]} for row in cursor.fetchall()]
            
            conn.close()
            
            return {
                'total_produits': total_produits,
                'valeur_stock': round(valeur_stock, 2),
                'produits_rupture': produits_rupture,
                'ventes_jour': round(ventes_jour, 2),
                'achats_mois': round(achats_mois, 2),
                'top_produits': top_produits,
                'alertes': alertes
            }
        except Exception as e:
            print(f"Erreur: {e}")
            return {}
    
    def rapport_stock(self, date_debut: str = '', date_fin: str = '') -> Dict:
        """Générer un rapport de stock"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            cursor.execute('''
                SELECT 
                    p.code_produit,
                    p.nom,
                    p.quantite_stock,
                    p.quantite_min,
                    p.quantite_max,
                    p.prix_achat,
                    p.prix_vente,
                    (p.quantite_stock * p.prix_achat) as valeur_stock
                FROM produits p
                WHERE p.actif = 1
                ORDER BY p.nom
            ''')
            
            produits = [dict(row) for row in cursor.fetchall()]
            conn.close()
            
            return {
                'date_generation': datetime.now().isoformat(),
                'produits': produits,
                'total_produits': len(produits),
                'valeur_totale': sum([p['valeur_stock'] or 0 for p in produits])
            }
        except Exception as e:
            print(f"Erreur: {e}")
            return {}
    
    def rapport_ventes(self, date_debut: str = '', date_fin: str = '') -> Dict:
        """Générer un rapport de ventes"""
        try:
            conn = self.db.get_connection()
            conn.row_factory = sqlite3.Row
            cursor = conn.cursor()
            
            if date_debut and date_fin:
                cursor.execute('''
                    SELECT 
                        v.numero_facture,
                        v.client_nom,
                        v.date_vente,
                        v.montant_total,
                        v.montant_paye,
                        v.statut,
                        u.nom as vendeur
                    FROM ventes v
                    LEFT JOIN utilisateurs u ON v.utilisateur_id = u.id
                    WHERE DATE(v.date_vente) BETWEEN ? AND ?
                    ORDER BY v.date_vente DESC
                ''', (date_debut, date_fin))
            else:
                cursor.execute('''
                    SELECT 
                        v.numero_facture,
                        v.client_nom,
                        v.date_vente,
                        v.montant_total,
                        v.montant_paye,
                        v.statut,
                        u.nom as vendeur
                    FROM ventes v
                    LEFT JOIN utilisateurs u ON v.utilisateur_id = u.id
                    ORDER BY v.date_vente DESC
                    LIMIT 100
                ''')
            
            ventes = [dict(row) for row in cursor.fetchall()]
            total_ventes = sum([v['montant_total'] or 0 for v in ventes])
            total_paye = sum([v['montant_paye'] or 0 for v in ventes])
            
            conn.close()
            
            return {
                'date_generation': datetime.now().isoformat(),
                'ventes': ventes,
                'total_ventes': round(total_ventes, 2),
                'total_paye': round(total_paye, 2),
                'total_credit': round(total_ventes - total_paye, 2),
                'nombre_transactions': len(ventes)
            }
        except Exception as e:
            print(f"Erreur: {e}")
            return {}

